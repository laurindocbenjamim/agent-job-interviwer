<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Interview Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f1016 0%, #171923 100%);
            --card-bg: rgba(26, 28, 41, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --accent-cyan: #00f2fe;
            --accent-warning: #ffb020;
            --accent-danger: #ff3366;
            --accent-success: #38a169;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 95%;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #ffffff, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
        }

        .dashboard {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .video-panel {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            aspect-ratio: 4/3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay-status {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.35rem 0.75rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-success);
        }

        .status-dot.active-gaze {
            background-color: var(--accent-cyan);
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .widget {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .widget h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 0 0 0.75rem 0;
            font-weight: 600;
        }

        .strike-tracker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .strike-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .strike-dot.active {
            background-color: var(--accent-danger);
            border-color: var(--accent-danger);
            color: white;
            box-shadow: 0 0 12px var(--accent-danger);
        }

        .status-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-badge:last-child {
            border-bottom: none;
        }

        .status-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-ok { color: var(--accent-success); }
        .status-warn { color: var(--accent-warning); }
        .status-danger { color: var(--accent-danger); }

        .banner {
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.4s ease forwards;
        }

        .banner-warning {
            background: rgba(255, 176, 32, 0.15);
            border: 1px solid var(--accent-warning);
            color: var(--accent-warning);
        }

        .banner-danger {
            background: rgba(255, 51, 102, 0.15);
            border: 1px solid var(--accent-danger);
            color: var(--accent-danger);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>AI-Monitored Interview Session</h1>
            <p class="subtitle">Secure compliance checks and eye-gaze tracking active</p>
        </header>

        <div id="warn-box" class="banner banner-warning"></div>
        <div id="quality-box" class="banner banner-warning"></div>

        <div class="dashboard">
            <div class="video-panel">
                <div class="overlay-status">
                    <div id="live-dot" class="status-dot"></div>
                    <span>LIVE STREAM</span>
                </div>
                <video id="webcam" autoplay muted></video>
                <canvas id="buffer" width="640" height="480" style="display:none;"></canvas>
            </div>

            <div class="side-panel">
                <div class="widget">
                    <h3>Candidate Strikes</h3>
                    <div class="strike-tracker">
                        <div id="strike-1" class="strike-dot">1</div>
                        <div id="strike-2" class="strike-dot">2</div>
                        <div id="strike-3" class="strike-dot">3</div>
                        <div id="strike-4" class="strike-dot">4</div>
                    </div>
                </div>

                <div class="widget">
                    <h3>Environment Quality</h3>
                    
                    <div class="status-badge">
                        <span class="status-label">Lighting</span>
                        <span id="light-val" class="status-value status-ok">Good</span>
                    </div>

                    <div class="status-badge">
                        <span class="status-label">Voice Level</span>
                        <span id="voice-val" class="status-value status-ok">Good</span>
                    </div>

                    <div class="status-badge">
                        <span class="status-label">Gaze Focus</span>
                        <span id="gaze-val" class="status-value status-ok">Focused</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('buffer');
        const ctx = canvas.getContext('2d');
        const warnBox = document.getElementById('warn-box');
        const qualityBox = document.getElementById('quality-box');
        
        const lightVal = document.getElementById('light-val');
        const voiceVal = document.getElementById('voice-val');
        const gazeVal = document.getElementById('gaze-val');
        const liveDot = document.getElementById('live-dot');

        let localStream = null;
        
        // Extract candidateId dynamically from route url: /interview/{candidate_id}
        const pathParts = window.location.pathname.split('/');
        const candidateId = pathParts[pathParts.length - 1] || "candidate_123";

        // Setup secure websocket client connection
        const wsScheme = window.location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(`${wsScheme}//${window.location.host}/ws/interview/${candidateId}`);

        // 1. Capture Camera and Audio Channels
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                video.srcObject = stream;
                setupAudioAnalysis(stream);
            })
            .catch(err => alert("Camera and Microphone access are mandatory."));

        // 2. Client-Side Realtime Audio Quality Check
        function setupAudioAnalysis(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) { sum += dataArray[i]; }
                let averageVolume = sum / dataArray.length;
                
                // If speaking but volume is critically low
                if (averageVolume > 2 && averageVolume < 15) {
                    qualityBox.innerText = "⚠️ Voice level too soft. Please speak louder.";
                    qualityBox.style.display = "flex";
                    voiceVal.innerText = "Too Soft";
                    voiceVal.className = "status-value status-warn";
                } else {
                    qualityBox.style.display = "none";
                    voiceVal.innerText = "Good";
                    voiceVal.className = "status-value status-ok";
                }
            }, 1000);
        }

        // 3. Process Video Frames and Receive Rules Instructions
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Set lighting quality indicators
            if (data.video_quality === "Too Dark") {
                qualityBox.innerText = "⚠️ Lighting quality poor. Please clear your room environment.";
                qualityBox.style.display = "flex";
                lightVal.innerText = "Too Dark";
                lightVal.className = "status-value status-danger";
            } else {
                lightVal.innerText = "Good";
                lightVal.className = "status-value status-ok";
            }

            // Update strike indicators visually
            const strikes = data.current_strikes || 0;
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`strike-${i}`);
                if (i <= strikes) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }

            if (data.action === "warn") {
                warnBox.innerText = `🚨 WARNING: Gaze deviation detected. Strike ${data.current_strikes}/3 Issued.`;
                warnBox.style.display = "flex";
                gazeVal.innerText = "Looking Away";
                gazeVal.className = "status-value status-danger";
                liveDot.className = "status-dot active-gaze";
            } else if (data.action === "continue") {
                warnBox.style.display = "none";
                gazeVal.innerText = "Focused";
                gazeVal.className = "status-value status-ok";
                liveDot.className = "status-dot";
            } else if (data.action === "terminate") {
                // Remove warning box and display termination details
                warnBox.style.display = "none";
                qualityBox.style.display = "none";
                
                const termBanner = document.createElement('div');
                termBanner.className = "banner banner-danger";
                termBanner.style.display = "flex";
                termBanner.innerText = "❌ Interview terminated due to multiple violations. Closing session...";
                document.body.prepend(termBanner);
                
                // Stop recording tracks and kill camera hardware light
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                video.srcObject = null;
                ws.close();
                
                // Shut down screen UI
                setTimeout(() => {
                    window.close();
                }, 2000);
            }
        };

        // Stream raw frames to FastAPI engine every 400ms
        setInterval(() => {
            if (ws.readyState === WebSocket.OPEN && localStream) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
                ws.send(JSON.stringify({ image: dataUrl }));
            }
        }, 400);
    </script>
</body>
</html>
