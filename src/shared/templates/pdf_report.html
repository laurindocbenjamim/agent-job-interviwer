<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Report - {{ candidate_id }}</title>
<style>
    @page {
        size: A4;
        margin: 20mm;
    }
    body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        color: #333;
        line-height: 1.6;
        margin: 0;
        padding: 0;
        background: #fff;
    }
    .header {
        border-bottom: 2px solid #2563eb;
        padding-bottom: 20px;
        margin-bottom: 30px;
    }
    .header h1 {
        color: #2563eb;
        margin: 0 0 5px 0;
        font-size: 24px;
        text-transform: uppercase;
    }
    .header .subtitle {
        font-size: 14px;
        color: #666;
        margin: 0;
    }
    .metadata {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 30px;
        background: #f8fafc;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid #e2e8f0;
    }
    .meta-item {
        flex: 1;
        min-width: 200px;
    }
    .meta-label {
        font-weight: bold;
        font-size: 12px;
        color: #64748b;
        text-transform: uppercase;
    }
    .meta-value {
        font-size: 14px;
        color: #0f172a;
    }
    .report-content {
        white-space: pre-wrap;
        font-size: 14px;
    }
    .footer {
        margin-top: 50px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
    }
    @media print {
        body { margin: 0; }
        .no-print { display: none; }
    }
    .print-btn {
        display: block;
        width: 100%;
        max-width: 200px;
        margin: 20px auto;
        padding: 10px 20px;
        background: #2563eb;
        color: #fff;
        text-align: center;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        border: none;
    }
    .print-btn:hover {
        background: #1d4ed8;
    }
</style>
</head>
<body>
    <button class="no-print print-btn" onclick="window.print()">Print to PDF</button>

    <div class="header">
        <h1>Antigravity Jobs</h1>
        <p class="subtitle">Official Interview Assessment Report</p>
    </div>

    <div class="metadata">
        <div class="meta-item">
            <div class="meta-label">Candidate ID</div>
            <div class="meta-value">{{ candidate_id }}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Date generated</div>
            <div class="meta-value">{{ date }}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Start Time</div>
            <div class="meta-value">{{ start_time }}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">End Time</div>
            <div class="meta-value">{{ end_time }}</div>
        </div>
    </div>

    <div class="report-content">
{{ report_text }}
    </div>

    <div class="footer">
        Generated by Agent Job Interviewer • Confidential Document
    </div>
</body>
</html>
